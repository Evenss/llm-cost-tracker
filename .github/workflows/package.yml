name: Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS app and DMG
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve package version
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == v* ]]; then
            echo "TOKEN_COST_BAR_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "TOKEN_COST_BAR_VERSION=0.1.0" >> "$GITHUB_ENV"
          fi
          echo "TOKEN_COST_BAR_BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"

      - name: Test
        run: swift test

      - name: Package
        run: |
          scripts/package-dmg.sh
          ditto -c -k --sequesterRsrc --keepParent build/TokenCostBar.app "dist/TokenCostBar-${TOKEN_COST_BAR_VERSION}.app.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TokenCostBar-${{ github.run_number }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.dmg dist/*.zip --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.dmg dist/*.zip --title "$GITHUB_REF_NAME" --generate-notes
          fi
